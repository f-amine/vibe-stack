# Deprecated — superseded by repo-root docker-compose.yml which boots
# both postgres + redis for dev. Kept as a fallback if you only need Postgres.
# Run: docker compose -f packages/db/docker-compose.yml up -d

name: starter-saas

services:
  postgres:
    image: postgres:17-alpine
    container_name: starter-saas-postgres
    environment:
      POSTGRES_DB: starter-saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - starter-saas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  starter-saas_postgres_data:
