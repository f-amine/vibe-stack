name: starter-saas

services:
  postgres:
    image: postgres
    container_name: starter-saas-postgres
    environment:
      POSTGRES_DB: starter-saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - starter-saas_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  starter-saas_postgres_data:
