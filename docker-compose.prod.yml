# Production stack for Dokploy / VPS deploy.
# Includes apps + Postgres + Redis + nightly R2 backup.
# Dev should use docker-compose.yml (infra only).

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vibestack}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: applies committed Drizzle migrations (packages/db/src/migrations)
  # before web/admin start. Generate migrations with `pnpm db:generate` and
  # commit them — this service is a no-op if none exist yet.
  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env.production

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.next
      args:
        APP_NAME: web
        APP_PORT: 3001
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: .env.production
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  marketing:
    build:
      context: .
      dockerfile: docker/Dockerfile.next
      args:
        APP_NAME: marketing
        APP_PORT: 3000
    restart: unless-stopped
    env_file: .env.production
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.next
      args:
        APP_NAME: admin
        APP_PORT: 3002
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: .env.production
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3002/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  backup:
    image: alpine:3.20
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env.production
    volumes:
      - ./scripts/backup-r2.sh:/usr/local/bin/backup-r2.sh:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache postgresql17-client aws-cli bash curl ca-certificates
        echo "0 3 * * * /usr/local/bin/backup-r2.sh >> /var/log/backup.log 2>&1" | crontab -
        crond -f -l 2

volumes:
  pgdata:
  redisdata:
